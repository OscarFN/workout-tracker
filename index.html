<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <meta name="theme-color" content="#050c18" />
  <title>Workout Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #050c18; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; color: #e2e8f0; }

    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }
    button { font-family: inherit; }
    .header { background: linear-gradient(180deg,#080f1e,#050c18); padding: 20px 18px 14px; border-bottom: 1px solid #0d1c30; position: sticky; top: 0; z-index: 10; }
    .header-inner { max-width: 500px; margin: 0 auto; }
    .header-top { font-size: 9px; color: #1e4a7a; font-weight: 800; letter-spacing: 0.22em; margin-bottom: 2px; }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 24px; font-weight: 800; color: #e2e8f0; letter-spacing: 0.02em; }
    .header-date { font-size: 10px; color: #3d5470; margin-top: 1px; }
    .history-btn { background: #0d1c30; border: 1px solid #1e3a5a; border-radius: 8px; color: #60a5fa; font-size: 11px; font-weight: 800; padding: 6px 12px; cursor: pointer; letter-spacing: 0.06em; }
    .day-tabs { overflow-x: auto; padding: 12px 18px; background: #050c18; border-bottom: 1px solid #0d1c30; }
    .day-tabs-inner { display: flex; gap: 6px; max-width: 500px; margin: 0 auto; min-width: max-content; }
    .day-btn { padding: 8px 10px; border-radius: 10px; border: 1.5px solid #0d1c30; background: transparent; cursor: pointer; min-width: 52px; text-align: center; position: relative; transition: all 0.2s; }
    .day-btn.active { border-color: var(--c); background: color-mix(in srgb, var(--c) 8%, transparent); }
    .day-btn.disabled { opacity: 0.3; cursor: default; }
    .day-dot { position: absolute; top: -3px; right: -3px; width: 7px; height: 7px; border-radius: 50%; border: 2px solid #050c18; }
    .day-dot.today { background: #facc15; }
    .day-dot.complete { left: -3px; right: auto; background: #22c55e; }
    .day-label { font-size: 9px; font-weight: 800; letter-spacing: 0.06em; }
    .day-emoji { font-size: 18px; margin-top: 2px; }
    .content { max-width: 500px; margin: 0 auto; padding: 16px; padding-bottom: 60px; }
    .banner { border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .banner-title { font-size: 11px; font-weight: 800; letter-spacing: 0.1em; }
    .banner-sub { font-size: 11px; margin-top: 1px; }
    .progress-bar-wrap { margin-bottom: 16px; }
    .progress-bar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
    .progress-label { color: #2d4060; font-size: 10px; font-weight: 800; letter-spacing: 0.1em; }
    .progress-val { font-size: 12px; font-weight: 700; font-family: monospace; }
    .progress-track { height: 3px; background: #0e1c30; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
    .superset-block { border-radius: 12px; padding: 8px; margin-bottom: 8px; }
    .superset-label { font-size: 9px; font-weight: 800; letter-spacing: 0.12em; margin-bottom: 6px; padding-left: 4px; }
    .ex-card { background: #080f1e; border-radius: 10px; margin-bottom: 6px; overflow: hidden; transition: all 0.25s; border: 1px solid #111c30; border-left: 3px solid #1a2a45; }
    .ex-card.logged { border-left-color: var(--c); }
    .ex-card.done { border-color: #22c55e44; border-left-color: #22c55e; }
    .ex-header { width: 100%; background: none; border: none; padding: 12px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 8px; text-align: left; color: inherit; }
    .ex-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
    .ex-name.done { color: #86efac; }
    .ex-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
    .ex-sets-info { color: #3d5470; font-size: 11px; }
    .last-weight-badge { font-size: 11px; font-weight: 700; border-radius: 4px; padding: 1px 6px; font-family: monospace; }
    .badge { font-size: 9px; font-weight: 800; border-radius: 3px; padding: 1px 5px; letter-spacing: 0.1em; margin-bottom: 2px; display: inline-block; }
    .bw-badge { color: #64748b; background: #1e293b; letter-spacing: 0.08em; }
    .chevron { color: #2d4060; font-size: 13px; transition: transform 0.2s; display: inline-block; }
    .chevron.open { transform: rotate(180deg); }
    .ex-body { padding: 0 14px 14px; }
    .info-banner { border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; font-size: 12px; display: flex; align-items: flex-start; gap: 7px; }
    .col-headers { display: grid; gap: 7px; margin-bottom: 7px; }
    .col-header { font-size: 10px; color: #2d4060; text-align: center; font-weight: 700; letter-spacing: 0.08em; }
    .set-row { display: grid; gap: 7px; align-items: center; margin-bottom: 8px; }
    .set-num { font-size: 11px; color: #64748b; font-weight: 700; text-align: center; font-family: monospace; }
    input.set-input { background: #0a1020; border-radius: 8px; color: #f1f5f9; padding: 8px 10px; font-size: 14px; width: 100%; outline: none; font-family: monospace; border: 1.5px solid #1a2540; }
    input.set-input.filled { border-color: #334155; }
    .check-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid #2d3f5c; background: #0a1020; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; transition: all 0.2s; flex-shrink: 0; }
    .check-btn.done { border: none; background: #22c55e; box-shadow: 0 0 10px #22c55e55; }
    .stretch-divider { display: flex; align-items: center; gap: 10px; margin: 24px 0 14px; }
    .stretch-divider-line { flex: 1; height: 1px; background: #0e1c30; }
    .stretch-divider-text { font-size: 10px; color: #2d4060; font-weight: 800; letter-spacing: 0.12em; white-space: nowrap; }
    .stretch-card { width: 100%; border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s; border: 1px solid #111c30; border-left: 3px solid #06b6d4; background: #080f1e; text-align: left; color: inherit; }
    .stretch-card.done { background: #052e1a; border-color: #22c55e44; border-left-color: #22c55e; }
    .stretch-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .stretch-name.done { color: #86efac; }
    .stretch-meta { display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
    .stretch-muscle { color: #3d5470; font-size: 11px; }
    .stretch-hold { color: #06b6d4; font-size: 11px; font-weight: 700; }
    .stretch-check { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid #2d3f5c; background: transparent; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; transition: all 0.2s; }
    .stretch-check.done { border: none; background: #22c55e; box-shadow: 0 0 10px #22c55e55; }
    .rest-day { text-align: center; padding: 80px 20px; }
    .rest-emoji { font-size: 56px; margin-bottom: 16px; }
    .rest-title { font-size: 22px; font-weight: 800; color: #1a2a40; letter-spacing: 0.05em; }
    .rest-sub { font-size: 13px; color: #0f1e30; margin-top: 8px; }
    .history-screen { min-height: 100vh; background: #050c18; padding-bottom: 40px; }
    .back-btn { background: none; border: none; color: #3b82f6; cursor: pointer; font-size: 13px; font-weight: 700; padding: 0 0 8px; display: flex; align-items: center; gap: 6px; }
    .history-ex-btn { width: 100%; background: #080f1e; border: 1px solid #0d1825; border-left: 3px solid #1a2a45; border-radius: 10px; padding: 11px 14px; margin-bottom: 6px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; text-align: left; color: inherit; }
    .history-ex-btn.has-data { border-color: #1a2a45; border-left-color: var(--c); }
    .history-ex-name { font-size: 13px; font-weight: 600; color: #3d5470; }
    .history-ex-name.has-data { color: #e2e8f0; }
    .history-ex-meta { color: #3d5470; font-size: 11px; margin-top: 2px; }
    .session-log-entry { background: #080f1e; border: 1px solid #111c30; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; border-left: 3px solid var(--c); }
    .chart-wrap { background: #080f1e; border: 1px solid #111c30; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .chart-label { font-size: 10px; color: #2d4060; font-weight: 800; letter-spacing: 0.1em; margin-bottom: 12px; }
    .no-data { text-align: center; padding: 60px 20px; color: #2d4060; }
    .no-data-emoji { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATE HELPERS ──────────────────────────────────────────────
function todayKey() {
  return new Date().toISOString().slice(0,10);
}
function fmtDate(key) {
  const d = new Date(key + "T12:00:00");
  return d.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
}
function dayOfWeek(key) {
  const d = new Date(key + "T12:00:00");
  return d.toLocaleDateString("en-US", { weekday:"long" });
}
function dateKeyForDay(dow) {
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const todayIdx = new Date().getDay();
  const targetIdx = days.indexOf(dow);
  let diff = todayIdx - targetIdx;
  if (diff < 0) diff += 7;
  const d = new Date();
  d.setDate(d.getDate() - diff);
  return d.toISOString().slice(0,10);
}

// ── DATA ──────────────────────────────────────────────────────
const STRETCHES = {

    { id:"sp1", name:"Chest Doorway Stretch", muscle:"Chest · Front Delts", hold:"40 sec" },
    { id:"sp2", name:"Cross-Body Shoulder Stretch", muscle:"Rear Delt · Rotator Cuff", hold:"40 sec each side" },

  ],

    { id:"sl2", name:"Hip Flexor Lunge Stretch", muscle:"Hip Flexors · Quads", hold:"60 sec each side" },

    { id:"sg1", name:"Hip Flexor Lunge Stretch", muscle:"Hip Flexors · Quads", hold:"60 sec each side" },
    { id:"sg2", name:"Hamstring Stretch", muscle:"Hamstrings", hold:"40 sec each side" },
    { id:"sg3", name:"Pigeon Pose / Figure-4", muscle:"Glutes · Piriformis", hold:"60 sec each side" },
    { id:"sg4", name:"Standing Quad Stretch", muscle:"Quads", hold:"40 sec each side" },
    { id:"sg5", name:"Calf Stretch (wall)", muscle:"Calves · Achilles", hold:"40 sec each side" },
  ],
  metabolic: [
    { id:"sm1", name:"Hip Flexor Lunge Stretch", muscle:"Hip Flexors · Quads", hold:"60 sec each side" },
    { id:"sm2", name:"Chest Doorway Stretch", muscle:"Chest · Front Delts", hold:"40 sec" },
    { id:"sm3", name:"Child's Pose", muscle:"Lower Back · Lats", hold:"60 sec" },
    { id:"sm4", name:"Hamstring Stretch", muscle:"Hamstrings", hold:"40 sec each side" },
  ],
};

const PROGRAM = {

    { id:"p1", name:"Incline Barbell Press", sets:4, repsTarget:"5–7", repRange:[5,7], rest:"90 sec" },
    { id:"p2", name:"DB Bench Press", sets:3, repsTarget:"10–12", repRange:[10,12], rest:"60 sec" },
    { id:"p3", name:"Seated DB Shoulder Press", sets:3, repsTarget:"10–12", repRange:[10,12], rest:"60 sec" },
    { id:"p4", name:"Lateral Raises", sets:3, repsTarget:"15", repRange:[15,15], rest:"45 sec", supersetWith:"p5" },
    { id:"p5", name:"Overhead Tricep Extension", sets:3, repsTarget:"12", repRange:[12,12], rest:"45 sec", supersetWith:"p4" },
    { id:"p6", name:"Tricep Pushdown (cable)", sets:3, repsTarget:"12–15", repRange:[12,15], rest:"45 sec", supersetWith:"p7" },
    { id:"p7", name:"Crunch Machine", sets:3, repsTarget:"12–15", repRange:[12,15], rest:"45 sec", supersetWith:"p6" },
  ]},
  pull: { label:"Pull", sublabel:"Back · Biceps · Rear Delts · Shoulders", emoji:"🫷", color:"#3b82f6", exercises: [
    { id:"pu1", name:"Deadlift / Trap Bar Deadlift", sets:4, repsTarget:"5–6", repRange:[5,6], rest:"90 sec" },
    { id:"pu2", name:"Lat Pulldown", sets:4, repsTarget:"10–12", repRange:[10,12], rest:"60 sec" },
    { id:"pu3", name:"Seated Cable Row", sets:3, repsTarget:"10–12", repRange:[10,12], rest:"60 sec" },
    { id:"pu4", name:"T-Bar Row", sets:3, repsTarget:"10–12", repRange:[10,12], rest:"60 sec" },
    { id:"pu5", name:"Rear Delt Cable Fly", sets:3, repsTarget:"15", repRange:[15,15], rest:"45 sec", supersetWith:"pu6" },
    { id:"pu6", name:"EZ Bar Curl", sets:3, repsTarget:"12", repRange:[12,12], rest:"45 sec", supersetWith:"pu5" },
    { id:"pu7", name:"Roman Chair Leg Raise", sets:3, repsTarget:"12–15", repRange:[12,15], rest:"45 sec", bodyweight:true, progressTip:"Progress: knee raise → straight leg raise → hold a plate on your chest" },
    { id:"pu8", name:"Cable Lateral Raises", sets:3, repsTarget:"15", repRange:[15,15], rest:"45 sec" },
  ]},
  legs: { label:"Legs", sublabel:"Quads · Hamstrings · Glutes · Calves", emoji:"🦵", color:"#22c55e", exercises: [
    { id:"l1", name:"Barbell Back Squat", sets:4, repsTarget:"6–8", repRange:[6,8], rest:"90 sec" },
    { id:"l2", name:"Romanian Deadlift", sets:4, repsTarget:"10–12", repRange:[10,12], rest:"60 sec" },
    { id:"l3", name:"Hip Thrust", sets:4, repsTarget:"10–12", repRange:[10,12], rest:"60 sec" },
    { id:"l4", name:"Leg Curl Machine", sets:3, repsTarget:"12–15", repRange:[12,15], rest:"45 sec", supersetWith:"l5" },
    { id:"l5", name:"Leg Extension Machine", sets:3, repsTarget:"12–15", repRange:[12,15], rest:"45 sec", supersetWith:"l4" },
    { id:"l6", name:"Standing Calf Raises", sets:4, repsTarget:"10–12", repRange:[10,12], rest:"45 sec" },
  ]},
  metabolic: { label:"Full Body Metabolic", sublabel:"Circuit · 4 rounds · 60 sec rest between rounds", emoji:"🔥", color:"#ef4444", isCircuit:true, exercises: [
    { id:"m1", name:"Burpees", sets:4, repsTarget:"10", repRange:[10,10], rest:"—", bodyweight:true, progressTip:"Progress: increase reps each week (10 → 12 → 15)" },
    { id:"m2", name:"Push-Ups / Dips", sets:4, repsTarget:"12–15", repRange:[12,15], rest:"—", bodyweight:true, progressTip:"Progress: push-ups → dips → add a DB between legs for resistance" },
    { id:"m3", name:"TRX Row", sets:4, repsTarget:"12", repRange:[12,12], rest:"—", bodyweight:true, progressTip:"Progress: more horizontal angle → slow eccentric (3 sec down)" },
    { id:"m4", name:"Mountain Climbers", sets:4, repsTarget:"30 sec", repRange:null, rest:"—", bodyweight:true, progressTip:"Progress: increase duration (30s → 40s → 45s)" },
    { id:"m5", name:"Rowing Machine Sprint", sets:4, repsTarget:"20 sec", repRange:null, rest:"—", isRowing:true },
    { id:"m6", name:"Plank Hold", sets:4, repsTarget:"40 sec", repRange:null, rest:"60 sec", bodyweight:true, progressTip:"Progress: increase duration (40s → 50s → 60s)" },
  ]},
  cardio: { label:"Cardio", sublabel:"Pick one for today", emoji:"🏃", color:"#a855f7", isChooseOne:true, exercises: [
    { id:"ca1", name:"Rowing Machine – Zone 2", sets:1, repsTarget:"30 min", repRange:null, rest:"—", bodyweight:true, progressTip:"Conversational pace · 60–65% max HR · Damper 5–6" },
    { id:"ca2", name:"Rowing Machine – HIIT", sets:15, repsTarget:"20s on / 40s off", repRange:null, rest:"40 sec", bodyweight:true, progressTip:"All-out on 20s · Build from 10 to 15 rounds · Damper 5–6" },
    { id:"ca3", name:"Stair Stepper – Steady State", sets:1, repsTarget:"30 min", repRange:null, rest:"—", bodyweight:true, progressTip:"Moderate pace · Great for glutes · 60–65% max HR" },
  ]},
};

const ALL_EXERCISES = Object.entries(PROGRAM).flatMap(([sKey,s]) =>
  s.exercises.map(e=>({...e, sessionKey:sKey, sessionLabel:s.label, sessionColor:s.color, sessionEmoji:s.emoji}))
);

const ELLIPTICAL_DAYS = ["Monday","Tuesday","Thursday","Friday"];
const WEEK_PLAN = [
  { day:"Monday", session:"push" },
  { day:"Tuesday", session:"pull" },
  { day:"Wednesday", session:"cardio" },
  { day:"Thursday", session:"legs" },
  { day:"Friday", session:"metabolic" },
  { day:"Saturday", session:"cardio" },
  { day:"Sunday", session:null },
];

const TODAY_KEY = todayKey();
const TODAY_DOW = dayOfWeek(TODAY_KEY);

// ── STORAGE ───────────────────────────────────────────────────
function loadLogs() {
  try { return JSON.parse(localStorage.getItem("wt_v5_logs")||"{}"); } catch { return {}; }
}
function saveLogs(logs) {
  try { localStorage.setItem("wt_v5_logs", JSON.stringify(logs)); } catch {}
}
let LOGS = loadLogs();

function initExercise(ex) {
  return Array.from({ length:ex.sets }, ()=>({ weight:"", reps:"", done:false }));
}

function getExLog(dateKey, exId, ex) {
  if (!LOGS[dateKey]) LOGS[dateKey] = { exercises:{}, stretches:{} };
  if (!LOGS[dateKey].exercises) LOGS[dateKey].exercises = {};
  if (!LOGS[dateKey].exercises[exId]) LOGS[dateKey].exercises[exId] = initExercise(ex);
  return LOGS[dateKey].exercises[exId];
}

function setExLog(dateKey, exId, sets) {
  if (!LOGS[dateKey]) LOGS[dateKey] = { exercises:{}, stretches:{} };
  if (!LOGS[dateKey].exercises) LOGS[dateKey].exercises = {};
  LOGS[dateKey].exercises[exId] = sets;
  saveLogs(LOGS);
}

function getStretchLog(dateKey) {
  return LOGS[dateKey]?.stretches || {};
}

function setStretchLog(dateKey, id, val) {
  if (!LOGS[dateKey]) LOGS[dateKey] = { exercises:{}, stretches:{} };
  if (!LOGS[dateKey].stretches) LOGS[dateKey].stretches = {};
  LOGS[dateKey].stretches[id] = val;
  saveLogs(LOGS);
}

function getLastSessionData(exerciseId, currentDateKey) {
  const keys = Object.keys(LOGS).filter(k=>k<currentDateKey).sort().reverse();
  for (const k of keys) {
    const sets = LOGS[k]?.exercises?.[exerciseId];
    if (sets && sets.length > 0) {
      const weights = sets.map(s=>parseFloat(s.weight)).filter(w=>!isNaN(w)&&w>0);
      const reps = sets.map(s=>parseInt(s.reps)).filter(r=>!isNaN(r));
      const allDone = sets.every(s=>s.done);
      if (weights.length>0||reps.length>0) return { weights, reps, allDone, dateKey:k };
    }
  }
  return null;
}

function getRepBanner(lastData, repRange, currentSets) {
  if (!lastData||!repRange) return null;
  if (lastData.reps.length>0) {
    const avg = lastData.reps.reduce((a,b)=>a+b,0)/lastData.reps.length;
    if (avg < repRange[0]-2) return "reduce";
  }
  if (lastData.allDone && lastData.reps.length>0 && lastData.reps.every(r=>r>=repRange[1])) {
    const lastMaxW = lastData.weights.length>0 ? Math.max(...lastData.weights) : 0;
    const curWeights = (currentSets||[]).map(s=>parseFloat(s.weight)).filter(w=>!isNaN(w)&&w>0);
    const curMaxW = curWeights.length>0 ? Math.max(...curWeights) : 0;
    if (curMaxW<=lastMaxW) return "increase";
  }
  return null;
}

function buildHistory(exerciseId, isBodyweight) {
  return Object.keys(LOGS).sort().map(dateKey=>{
    const sets = LOGS[dateKey]?.exercises?.[exerciseId];
    if (!sets||sets.length===0) return null;
    const weights = sets.map(s=>parseFloat(s.weight)).filter(w=>!isNaN(w)&&w>0);
    const reps = sets.map(s=>parseInt(s.reps)).filter(r=>!isNaN(r));
    const done = sets.every(s=>s.done);
    if (isBodyweight) {
      if (reps.length===0) return null;
      return { dateKey, label:fmtDate(dateKey), maxReps:Math.max(...reps), sets, done };
    } else {
      if (weights.length===0) return null;
      return { dateKey, label:fmtDate(dateKey), maxWeight:Math.max(...weights), sets, done };
    }
  }).filter(Boolean);
}

// ── SVG CHART ─────────────────────────────────────────────────
function renderChart(entries, color, isBodyweight) {
  if (entries.length < 2) return '<p style="text-align:center;padding:28px 0;color:#2d4060;font-size:12px">Log at least 2 sessions to see the graph</p>';
  const data = entries.slice(-12);
  const W=300, H=110, PL=38, PR=10, PT=8, PB=32;
  const plotW=W-PL-PR, plotH=H-PT-PB;
  const vals = data.map(e=>isBodyweight?e.maxReps:e.maxWeight);
  const minV=Math.min(...vals), maxV=Math.max(...vals), range=maxV-minV||5;
  const px=i=>PL+(data.length===1?plotW/2:(i/(data.length-1))*plotW);
  const py=v=>PT+plotH-((v-minV)/range)*plotH;
  const pts = data.map((e,i)=>`${px(i)},${py(isBodyweight?e.maxReps:e.maxWeight)}`).join(" ");
  const area = data.length<2?"":(`M${px(0)},${py(vals[0])} `+data.slice(1).map((e,i)=>`L${px(i+1)},${py(isBodyweight?e.maxReps:e.maxWeight)}`).join(" ")+` L${px(data.length-1)},${PT+plotH} L${px(0)},${PT+plotH} Z`);
  const yLabels = [minV, minV+range*0.5, maxV].map(v=>Math.round(v));
  let svg = `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">`;
  [0,0.5,1].forEach((t,i)=>{ svg+=`<line x1="${PL}" y1="${PT+plotH*(1-t)}" x2="${PL+plotW}" y2="${PT+plotH*(1-t)}" stroke="#0e1c30" stroke-width="1"/>`; });
  if(area) svg+=`<path d="${area}" fill="${color}18"/>`;
  svg+=`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  data.forEach((e,i)=>{ svg+=`<circle cx="${px(i)}" cy="${py(isBodyweight?e.maxReps:e.maxWeight)}" r="3.5" fill="${color}" stroke="#080f1e" stroke-width="1.5"/>`; });
  yLabels.forEach((v,i)=>{ svg+=`<text x="${PL-4}" y="${PT+plotH*(1-i*0.5)+4}" text-anchor="end" font-size="9" fill="#3d5470" font-family="monospace">${v}</text>`; });
  data.forEach((e,i)=>{
    const show = data.length<=6||(i===0||i===data.length-1||i%3===0);
    if(show) { const lbl=e.label.split(" ").slice(1).join(" "); svg+=`<text x="${px(i)}" y="${H-2}" text-anchor="middle" font-size="8" fill="#3d5470" font-family="sans-serif">${lbl}</text>`; }
  });
  svg+=`<text x="8" y="${PT+plotH/2}" text-anchor="middle" font-size="8" fill="#2d4060" transform="rotate(-90,8,${PT+plotH/2})" font-family="monospace">${isBodyweight?"reps":"lbs"}</text>`;
  svg+=`</svg>`;
  return svg;
}

// ── STATE ─────────────────────────────────────────────────────
let state = {
  activeDay: TODAY_DOW || "Monday",
  screen: "main", // "main" | "history" | "historyEx"
  selectedExId: null,
  openCards: {},
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ── RENDER HELPERS ────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v])=>{
    if (k==="className") e.className=v;
    else if (k==="style") e.style.cssText=v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{
    if (c===null||c===undefined) return;
    if (typeof c==="string"||typeof c==="number") e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}

function html(h) {
  const d = document.createElement("div");
  d.innerHTML = h;
  return d.firstChild || d;
}

// ── COMPONENTS ────────────────────────────────────────────────
function renderSetRow(ex, setIdx, set, dateKey) {
  const isBW = !!ex.bodyweight;
  const isRowing = !!ex.isRowing;
  const showWeight = !isBW && !isRowing;
  const lastData = getLastSessionData(ex.id, dateKey);
  const lastWeight = (!isBW&&!isRowing&&lastData?.weights?.length>0) ? lastData.weights[lastData.weights.length-1] : null;

  const cols = isRowing ? "22px 1fr 1fr 32px" : showWeight ? "22px 1fr 1fr 32px" : "22px 1fr 32px";
  const row = el("div", { className:"set-row", style:`grid-template-columns:${cols}` });
  row.appendChild(el("span", { className:"set-num" }, setIdx+1));

  if (showWeight) {
    const inp = el("input", { type:"number", inputmode:"decimal", className:"set-input" + (set.weight?" filled":""), placeholder: lastWeight?String(lastWeight):"lbs", value:set.weight||"" });
    inp.addEventListener("input", e=>{ const sets=getExLog(dateKey,ex.id,ex); sets[setIdx].weight=e.target.value; setExLog(dateKey,ex.id,sets); renderExCard(ex,dateKey); });
    row.appendChild(inp);
  }
  if (isRowing) {
    const inp = el("input", { type:"number", inputmode:"decimal", className:"set-input" + (set.weight?" filled":""), placeholder:"resistance", value:set.weight||"" });
    inp.addEventListener("input", e=>{ const sets=getExLog(dateKey,ex.id,ex); sets[setIdx].weight=e.target.value; setExLog(dateKey,ex.id,sets); renderExCard(ex,dateKey); });
    row.appendChild(inp);
  }

  const repsInp = el("input", { type:"text", inputmode:"numeric", className:"set-input" + (set.reps?" filled":""), placeholder:"reps", value:set.reps||"" });
  repsInp.addEventListener("input", e=>{ const sets=getExLog(dateKey,ex.id,ex); sets[setIdx].reps=e.target.value; setExLog(dateKey,ex.id,sets); renderExCard(ex,dateKey); });
  row.appendChild(repsInp);

  const checkBtn = el("button", { className:"check-btn" + (set.done?" done":"") }, set.done?"✓":"");
  checkBtn.addEventListener("click", ()=>{ const sets=getExLog(dateKey,ex.id,ex); sets[setIdx].done=!sets[setIdx].done; setExLog(dateKey,ex.id,sets); renderExCard(ex,dateKey); updateProgress(dateKey); });
  row.appendChild(checkBtn);
  return row;
}

function renderExCard(ex, dateKey, supersetLabel) {
  const sets = getExLog(dateKey, ex.id, ex);
  const allDone = sets.every(s=>s.done);
  const anyLogged = sets.some(s=>s.done||s.weight||s.reps);
  const isBW = !!ex.bodyweight;
  const isRowing = !!ex.isRowing;
  const lastData = getLastSessionData(ex.id, dateKey);
  const lastWeight = (!isBW&&!isRowing&&lastData?.weights?.length>0) ? lastData.weights[lastData.weights.length-1] : null;
  const banner = getRepBanner(lastData, ex.repRange, sets);
  const session = PROGRAM[WEEK_PLAN.find(w=>dateKeyForDay(w.day)===dateKey)?.session] || Object.values(PROGRAM)[0];
  const color = ALL_EXERCISES.find(e=>e.id===ex.id)?.sessionColor || "#6366f1";
  const isOpen = state.openCards[ex.id];

  const card = el("div", { className:`ex-card${allDone?" done":anyLogged?" logged":""}`, style:`--c:${color}`, "data-exid":ex.id });
  const header = el("button", { className:"ex-header" });
  const headerLeft = el("div", { style:"text-align:left;min-width:0;flex:1" });

  const badges = el("div", { style:"display:flex;gap:4px;margin-bottom:2px;flex-wrap:wrap" });
  if (supersetLabel) { const b=el("span",{className:"badge",style:`color:${color};background:${color}20`},supersetLabel); badges.appendChild(b); }
  if (isBW) badges.appendChild(el("span",{className:"badge bw-badge"},"BODYWEIGHT"));
  if (badges.children.length) headerLeft.appendChild(badges);

  headerLeft.appendChild(el("div",{className:"ex-name"+(allDone?" done":"")},ex.name));
  const meta = el("div",{className:"ex-meta"});
  meta.appendChild(el("span",{className:"ex-sets-info"},`${ex.sets} sets · ${ex.repsTarget} · rest ${ex.rest}`));
  if (lastWeight) {
    const badge = el("span",{className:"last-weight-badge",style:`color:${color};background:${color}18`},`↑ ${lastWeight} lbs`);
    meta.appendChild(badge);
  }
  headerLeft.appendChild(meta);
  header.appendChild(headerLeft);

  const headerRight = el("div",{style:"display:flex;align-items:center;gap:8px;flex-shrink:0"});
  if (allDone) headerRight.appendChild(el("span",{},"✅"));
  headerRight.appendChild(el("span",{className:"chevron"+(isOpen?" open":"")},"▾"));
  header.appendChild(headerRight);
  header.addEventListener("click",()=>{
    state.openCards[ex.id] = !state.openCards[ex.id];
    const existing = document.querySelector(`[data-exid="${ex.id}"]`);
    if (existing) { const newCard = renderExCard(ex, dateKey, supersetLabel); existing.replaceWith(newCard); updateProgress(dateKey); }
  });
  card.appendChild(header);

  if (isOpen) {
    const body = el("div",{className:"ex-body"});
    if (isBW && ex.progressTip) {
      const b = el("div",{className:"info-banner",style:"background:#0f2236;border:1px solid #1e3a5a;color:#60a5fa"});
      b.innerHTML = `<span>📈</span><span>${ex.progressTip}</span>`; body.appendChild(b);
    }
    if (isRowing) {
      const b = el("div",{className:"info-banner",style:"background:#0f2236;border:1px solid #1e3a5a;color:#60a5fa"});
      b.innerHTML = `<span>🚣</span><span>Log your damper resistance setting (recommended: 5–6)</span>`; body.appendChild(b);
    }
    if (lastWeight) {
      const b = el("div",{className:"info-banner",style:`background:${color}10;border:1px solid ${color}28;color:${color}`});
      b.innerHTML = `<span>🏋️</span><span>Last session (${fmtDate(lastData.dateKey)}): <strong>${lastWeight} lbs</strong> — start here or go heavier</span>`; body.appendChild(b);
    }
    if (banner==="reduce") {
      const b = el("div",{className:"info-banner",style:"background:#3f0f0f;border:1px solid #7f1d1d;color:#fca5a5"});
      b.innerHTML = `<span>⚠️</span><span>Last session reps were low — try <strong>reducing weight 5–10 lbs</strong></span>`; body.appendChild(b);
    }
    if (banner==="increase") {
      const b = el("div",{className:"info-banner",style:"background:#052e16;border:1px solid #14532d;color:#86efac"});
      b.innerHTML = `<span>🟢</span><span>All sets completed last session — consider <strong>adding 5 lbs</strong> today</span>`; body.appendChild(b);
    }

    const colHeaders = el("div",{className:"col-headers",style:`grid-template-columns:${isBW?"22px 1fr 32px":isRowing?"22px 1fr 1fr 32px":"22px 1fr 1fr 32px"}`});
    colHeaders.appendChild(el("span",{},""));
    if (isRowing) colHeaders.appendChild(el("span",{className:"col-header"},"RESISTANCE"));
    else if (!isBW) colHeaders.appendChild(el("span",{className:"col-header"},"LBS"));
    colHeaders.appendChild(el("span",{className:"col-header"},"REPS"));
    colHeaders.appendChild(el("span",{className:"col-header"},"✓"));
    body.appendChild(colHeaders);

    sets.forEach((s,i)=>body.appendChild(renderSetRow(ex,i,s,dateKey)));
    card.appendChild(body);
  }
  return card;
}

function updateProgress(dateKey) {
  const plan = WEEK_PLAN.find(w=>dateKeyForDay(w.day)===dateKey);
  if (!plan||!plan.session) return;
  const session = PROGRAM[plan.session];
  let totalSets, doneSets;
  if (session.isChooseOne) {
    const anyComplete = session.exercises.some(ex=>{ const s=LOGS[dateKey]?.exercises?.[ex.id]||[]; return s.length>0&&s.every(x=>x.done); });
    totalSets=1; doneSets=anyComplete?1:0;
  } else {
    totalSets = session.exercises.reduce((a,e)=>a+e.sets,0);
    doneSets = session.exercises.reduce((a,e)=>a+(LOGS[dateKey]?.exercises?.[e.id]||[]).filter(s=>s.done).length,0);
  }
  const pct = totalSets>0?Math.round((doneSets/totalSets)*100):0;
  const fill = document.querySelector(".progress-fill.ex-progress");
  const val = document.querySelector(".progress-val.ex-progress");
  if (fill) { fill.style.width=`${pct}%`; fill.style.background=pct===100?"#22c55e":session.color; fill.style.boxShadow=pct>0?`0 0 8px ${session.color}66`:"none"; }
  if (val) val.textContent = pct===100?"🎉 Done!":pct+"%";
  // update tab completion dots
  renderDayTabs();
}

function renderDayTabs() {
  const existing = document.querySelector(".day-tabs-inner");
  if (!existing) return;
  existing.innerHTML = "";
  WEEK_PLAN.forEach(({day,session:s})=>{
    const isActive=day===state.activeDay;
    const isToday=day===TODAY_DOW;
    const prog=s?PROGRAM[s]:null;
    const dKey=dateKeyForDay(day);
    let complete=false;
    if(prog){
      const exLogs=LOGS[dKey]?.exercises||{};
      if(prog.isChooseOne){complete=prog.exercises.some(ex=>{const sets=exLogs[ex.id]||[];return sets.length>0&&sets.every(s=>s.done);});}
      else{const td=prog.exercises.reduce((a,e)=>a+(exLogs[e.id]||[]).filter(x=>x.done).length,0);const ts=prog.exercises.reduce((a,e)=>a+e.sets,0);complete=ts>0&&td===ts;}
    }
    const btn = el("button",{className:`day-btn${isActive?" active":""}${!s?" disabled":""}`,style:`--c:${prog?prog.color:"#334155"}`});
    if(isToday){const dot=el("div",{className:"day-dot today"});existing.parentElement&&btn.appendChild(dot);}
    if(complete){const dot=el("div",{className:"day-dot complete"});btn.appendChild(dot);}
    if(isToday){const dot2=el("div",{className:"day-dot today"});btn.appendChild(dot2);}
    btn.appendChild(el("div",{className:"day-label",style:`color:${isActive?(prog?prog.color:"#94a3b8"):"#2d4060"}`},day.slice(0,3).toUpperCase()));
    btn.appendChild(el("div",{className:"day-emoji"},prog?prog.emoji:"😴"));
    if(s) btn.addEventListener("click",()=>setState({activeDay:day}));
    existing.appendChild(btn);
  });
}

function renderSession(sessionKey, dateKey) {
  const session = PROGRAM[sessionKey];
  const frag = document.createDocumentFragment();
  const dow = dayOfWeek(dateKey);

  if (ELLIPTICAL_DAYS.includes(dow)) {
    const b = el("div",{className:"banner",style:"background:#071520;border:1px solid #0e3a55"});
    b.innerHTML=`<span style="font-size:20px">⚡</span><div><div class="banner-title" style="color:#38bdf8">ELLIPTICAL REMINDER</div><div class="banner-sub" style="color:#4a90aa">30 min Zone 2 after lifting · Conversational pace</div></div>`;
    frag.appendChild(b);
  }
  if (session.isChooseOne) {
    const b = el("div",{className:"banner",style:`background:#1a0a2e;border:1px solid ${session.color}44`});
    b.innerHTML=`<span style="font-size:20px">🎯</span><div><div class="banner-title" style="color:${session.color}">PICK ONE FOR TODAY</div><div class="banner-sub" style="color:#7c5aaa">Complete any one exercise to finish the session</div></div>`;
    frag.appendChild(b);
  }
  if (session.isCircuit) {
    const b = el("div",{className:"banner",style:"background:#1a0808;border:1px solid #7f1d1d44"});
    b.innerHTML=`<span style="font-size:20px">🔄</span><div><div class="banner-title" style="color:#fca5a5">CIRCUIT FORMAT</div><div class="banner-sub" style="color:#9a6060">All 6 exercises back-to-back = 1 round · Rest 60 sec · Repeat 4 rounds</div></div>`;
    frag.appendChild(b);
  }

  // Progress bar
  let totalSets, doneSets;
  if (session.isChooseOne) {
    const anyComplete = session.exercises.some(ex=>{ const s=LOGS[dateKey]?.exercises?.[ex.id]||[]; return s.length>0&&s.every(x=>x.done); });
    totalSets=1; doneSets=anyComplete?1:0;
  } else {
    totalSets = session.exercises.reduce((a,e)=>a+e.sets,0);
    doneSets = session.exercises.reduce((a,e)=>a+(LOGS[dateKey]?.exercises?.[e.id]||[]).filter(s=>s.done).length,0);
  }
  const pct = totalSets>0?Math.round((doneSets/totalSets)*100):0;
  const progWrap = el("div",{className:"progress-bar-wrap"});
  const progTop = el("div",{className:"progress-bar-top"});
  progTop.appendChild(el("span",{className:"progress-label"},"SESSION PROGRESS"));
  progTop.appendChild(el("span",{className:"progress-val ex-progress",style:`color:${pct===100?"#22c55e":"#4a6080"}`},pct===100?"🎉 Done!":pct+"%"));
  progWrap.appendChild(progTop);
  const track = el("div",{className:"progress-track"});
  const fill = el("div",{className:"progress-fill ex-progress",style:`width:${pct}%;background:${pct===100?"#22c55e":session.color};box-shadow:${pct>0?`0 0 8px ${session.color}66`:"none"}`});
  track.appendChild(fill); progWrap.appendChild(track); frag.appendChild(progWrap);

  // Build exercises grouping supersets
  const rendered=[]; const seen=new Set();
  session.exercises.forEach(ex=>{
    if(seen.has(ex.id))return;
    if(ex.supersetWith){
      const partner=session.exercises.find(e=>e.id===ex.supersetWith);
      if(partner&&!seen.has(partner.id)){seen.add(ex.id);seen.add(partner.id);rendered.push({type:"superset",exercises:[ex,partner]});return;}
    }
    seen.add(ex.id);rendered.push({type:"single",exercise:ex});
  });

  rendered.forEach(item=>{
    if(item.type==="superset"){
      const color=ALL_EXERCISES.find(e=>e.id===item.exercises[0].id)?.sessionColor||"#6366f1";
      const block=el("div",{className:"superset-block",style:`border:1px dashed ${color}44;background:${color}06`});
      block.appendChild(el("div",{className:"superset-label",style:`color:${color}`},"⚡ SUPERSET"));
      item.exercises.forEach((ex,i)=>{ getExLog(dateKey,ex.id,ex); block.appendChild(renderExCard(ex,dateKey,i===0?"A":"B")); });
      frag.appendChild(block);
    } else {
      getExLog(dateKey,item.exercise.id,item.exercise);
      frag.appendChild(renderExCard(item.exercise,dateKey));
    }
  });

  // Stretches
  const stretches = STRETCHES[sessionKey];
  if (stretches) {
    const stretchLog = getStretchLog(dateKey);
    const div = el("div",{className:"stretch-divider"});
    div.appendChild(el("div",{className:"stretch-divider-line"}));
    div.appendChild(el("span",{className:"stretch-divider-text"},"🧘 POST-WORKOUT STRETCHES"));
    div.appendChild(el("div",{className:"stretch-divider-line"}));
    frag.appendChild(div);

    const sDone = stretches.filter(s=>stretchLog[s.id]).length;
    const sPct = Math.round((sDone/stretches.length)*100);
    const sProgWrap = el("div",{className:"progress-bar-wrap"});
    const sProgTop = el("div",{className:"progress-bar-top"});
    sProgTop.appendChild(el("span",{className:"progress-label"},"STRETCH PROGRESS"));
    sProgTop.appendChild(el("span",{className:"progress-val",style:`color:${sPct===100?"#22c55e":"#4a6080"}`},sPct===100?"🎉 All done!":sDone+"/"+stretches.length));
    sProgWrap.appendChild(sProgTop);
    const sTrack=el("div",{className:"progress-track"});
    const sFill=el("div",{className:"progress-fill",style:`width:${sPct}%;background:${sPct===100?"#22c55e":"#06b6d4"}`});
    sTrack.appendChild(sFill); sProgWrap.appendChild(sTrack); frag.appendChild(sProgWrap);

    stretches.forEach(s=>{
      const isDone=!!stretchLog[s.id];
      const card=el("button",{className:"stretch-card"+(isDone?" done":"")});
      const left=el("div",{});
      left.appendChild(el("div",{className:"stretch-name"+(isDone?" done":"")},s.name));
      const meta=el("div",{className:"stretch-meta"});
      meta.appendChild(el("span",{className:"stretch-muscle"},s.muscle));
      meta.appendChild(el("span",{className:"stretch-hold"},"⏱ "+s.hold));
      left.appendChild(meta); card.appendChild(left);
      card.appendChild(el("div",{className:"stretch-check"+(isDone?" done":"")},isDone?"✓":""));
      card.addEventListener("click",()=>{
        setStretchLog(dateKey,s.id,!isDone);
        render();
      });
      frag.appendChild(card);
    });
  }

  return frag;
}

function renderHistoryList() {
  const frag = document.createDocumentFragment();

  sessions.forEach(([sKey,s])=>{
    const section = el("div",{style:"margin-bottom:20px"});

      const isBW=!!ex.bodyweight||!!ex.isRowing;
      const entries=buildHistory(ex.id,isBW);

function renderHistoryEx(exId) {
  const ex = ALL_EXERCISES.find(e=>e.id===exId);
  const isBW = !!ex.bodyweight||!!ex.isRowing;
  const entries = buildHistory(ex.id, isBW);
  const recent = entries.slice(-12).reverse();
  const frag = document.createDocumentFragment();

  if (entries.length===0) {
    const noData = el("div",{className:"no-data"});
    noData.appendChild(el("div",{className:"no-data-emoji"},"📭"));
    noData.appendChild(el("div",{style:"font-size:14px"},"No sessions logged yet."));
    frag.appendChild(noData);
    return frag;
  }

  const chartWrap = el("div",{className:"chart-wrap"});
  chartWrap.appendChild(el("div",{className:"chart-label"},isBW?"REPS PROGRESSION":"WEIGHT PROGRESSION (lbs)"));
  chartWrap.innerHTML += renderChart(entries, ex.sessionColor, isBW);
  frag.appendChild(chartWrap);

  frag.appendChild(el("div",{style:"font-size:10px;color:#2d4060;font-weight:800;letter-spacing:0.1em;margin-bottom:10px"},`SESSION LOG · LAST ${recent.length} SESSIONS`));

  recent.forEach(entry=>{
    const sets = LOGS[entry.dateKey]?.exercises?.[exId]||[];
    const entryEl = el("div",{className:"session-log-entry",style:`--c:${ex.sessionColor}`});
    const topRow = el("div",{style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"});
    topRow.appendChild(el("span",{style:"color:#e2e8f0;font-size:13px;font-weight:700"},entry.label));
    topRow.appendChild(el("span",{style:`color:${ex.sessionColor};font-size:12px;font-weight:700;font-family:monospace`},isBW?`Max: ${entry.maxReps} reps`:`Max: ${entry.maxWeight} lbs`));
    entryEl.appendChild(topRow);
    const cols = el("div",{style:`display:grid;grid-template-columns:${isBW?"22px 1fr 1fr":"22px 1fr 1fr 1fr"};gap:6px`});
    cols.appendChild(el("span",{},""));
    if(!isBW) cols.appendChild(el("span",{style:"font-size:10px;color:#2d4060;font-weight:700"},"LBS"));
    cols.appendChild(el("span",{style:"font-size:10px;color:#2d4060;font-weight:700"},"REPS"));
    cols.appendChild(el("span",{style:"font-size:10px;color:#2d4060;font-weight:700"},"DONE"));
    entryEl.appendChild(cols);
    sets.forEach((s,j)=>{
      const row=el("div",{style:`display:grid;grid-template-columns:${isBW?"22px 1fr 1fr":"22px 1fr 1fr 1fr"};gap:6px;margin-top:5px;align-items:center`});
      row.appendChild(el("span",{style:"font-size:10px;color:#3d5470;text-align:center;font-family:monospace"},j+1));
      if(!isBW) row.appendChild(el("span",{style:`font-size:13px;color:${s.weight?"#e2e8f0":"#2d4060"};font-family:monospace`},s.weight||"—"));
      row.appendChild(el("span",{style:`font-size:13px;color:${s.reps?"#e2e8f0":"#2d4060"};font-family:monospace`},s.reps||"—"));
      row.appendChild(el("span",{style:"font-size:13px"},s.done?"✅":"—"));
      entryEl.appendChild(row);
    });
    frag.appendChild(entryEl);
  });
  return frag;
}

// ── MAIN RENDER ───────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  if (state.screen==="history"||state.screen==="historyEx") {
    const screen = el("div",{className:"history-screen"});
    const hdr = el("div",{className:"header"});
    const inner = el("div",{className:"header-inner"});
    const backBtn = el("button",{className:"back-btn"},state.screen==="historyEx"?"← Back to History":"← Back to Tracker");
    backBtn.addEventListener("click",()=>setState({screen:state.screen==="historyEx"?"history":"main",selectedExId:null}));
    inner.appendChild(backBtn);
    if (state.screen==="history") {
      inner.appendChild(el("div",{style:"font-size:9px;color:#1e4a7a;font-weight:800;letter-spacing:0.22em;margin-bottom:2px"},"EXERCISE"));
      inner.appendChild(el("div",{style:"font-size:24px;font-weight:800;color:#e2e8f0;letter-spacing:0.02em"},"HISTORY"));
    } else {
      const ex=ALL_EXERCISES.find(e=>e.id===state.selectedExId);
      inner.appendChild(el("div",{style:`font-size:9px;color:${ex.sessionColor};font-weight:800;letter-spacing:0.15em;margin-bottom:2px`},ex.sessionEmoji+" "+ex.sessionLabel.toUpperCase()));
      inner.appendChild(el("div",{style:"font-size:20px;font-weight:800;color:#e2e8f0"},ex.name));
    }
    hdr.appendChild(inner); screen.appendChild(hdr);
    const content = el("div",{className:"content"});
    content.appendChild(state.screen==="history"?renderHistoryList():renderHistoryEx(state.selectedExId));
    screen.appendChild(content); app.appendChild(screen);
    return;
  }

  // Main screen
  const activeDateKey = dateKeyForDay(state.activeDay);
  const currentPlan = WEEK_PLAN.find(d=>d.day===state.activeDay);
  const sessionKey = currentPlan?.session;
  const session = sessionKey ? PROGRAM[sessionKey] : null;

  // Header
  const hdr = el("div",{className:"header"});
  const hdrInner = el("div",{className:"header-inner"});
  hdrInner.appendChild(el("div",{className:"header-top"},"FAT LOSS · MUSCLE PRESERVATION"));
  const hdrRow = el("div",{className:"header-row"});
  const hdrLeft = el("div",{});
  hdrLeft.appendChild(el("div",{className:"header-title"},"WORKOUT TRACKER"));
  if (session) hdrLeft.appendChild(el("div",{className:"header-date"},(activeDateKey===TODAY_KEY?"Today":"Past session")+" · "+fmtDate(activeDateKey)));
  hdrRow.appendChild(hdrLeft);
  const histBtn = el("button",{className:"history-btn"},"📊 HISTORY");
  histBtn.addEventListener("click",()=>setState({screen:"history"}));
  hdrRow.appendChild(histBtn);
  hdrInner.appendChild(hdrRow); hdr.appendChild(hdrInner); app.appendChild(hdr);

  // Day tabs
  const tabsWrap = el("div",{className:"day-tabs"});
  const tabsInner = el("div",{className:"day-tabs-inner"});
  WEEK_PLAN.forEach(({day,session:s})=>{
    const isActive=day===state.activeDay;
    const isToday=day===TODAY_DOW;
    const prog=s?PROGRAM[s]:null;
    const dKey=dateKeyForDay(day);
    const exLogs=LOGS[dKey]?.exercises||{};
    let complete=false;
    if(prog){
      if(prog.isChooseOne){complete=prog.exercises.some(ex=>{const sets=exLogs[ex.id]||[];return sets.length>0&&sets.every(s=>s.done);});}
      else{const td=prog.exercises.reduce((a,e)=>a+(exLogs[e.id]||[]).filter(x=>x.done).length,0);const ts=prog.exercises.reduce((a,e)=>a+e.sets,0);complete=ts>0&&td===ts;}
    }
    const btn=el("button",{className:`day-btn${isActive?" active":""}${!s?" disabled":""}`,style:`--c:${prog?prog.color:"#334155"}`});
    if(isToday){const dot=el("div",{className:"day-dot today"});btn.appendChild(dot);}
    if(complete){const dot=el("div",{className:"day-dot complete"});btn.appendChild(dot);}
    btn.appendChild(el("div",{className:"day-label",style:`color:${isActive?(prog?prog.color:"#94a3b8"):"#2d4060"}`},day.slice(0,3).toUpperCase()));
    btn.appendChild(el("div",{className:"day-emoji"},prog?prog.emoji:"😴"));
    if(s) btn.addEventListener("click",()=>setState({activeDay:day}));
    tabsInner.appendChild(btn);
  });
  tabsWrap.appendChild(tabsInner); app.appendChild(tabsWrap);

  // Content
  const content = el("div",{className:"content"});
  if (sessionKey) {
    content.appendChild(renderSession(sessionKey, activeDateKey));
  } else {
    const restDiv = el("div",{className:"rest-day"});
    restDiv.appendChild(el("div",{className:"rest-emoji"},"😴"));
    restDiv.appendChild(el("div",{className:"rest-title"},"REST DAY"));
    restDiv.appendChild(el("div",{className:"rest-sub"},"Recovery is where progress happens."));
    content.appendChild(restDiv);
  }
  app.appendChild(content);
}

render();
</script>
</body>
