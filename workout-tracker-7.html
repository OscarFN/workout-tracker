<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <meta name="theme-color" content="#050c18" />
  <title>Workout Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #050c18; }
    body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input::placeholder { color: #1e3050; }
    ::-webkit-scrollbar { height: 3px; width: 3px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── DATE HELPERS ──────────────────────────────────────────────
    // dateKey: "YYYY-MM-DD" used as primary log key
    function todayKey() {
      const d = new Date();
      return d.toISOString().slice(0,10);
    }
    function fmtDate(key) {
      // "2024-11-04" -> "Mon Nov 4"
      const d = new Date(key + "T12:00:00");
      return d.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
    }
    function dayOfWeek(key) {
      const d = new Date(key + "T12:00:00");
      return d.toLocaleDateString("en-US", { weekday:"long" });
    }

    // ── STRETCHES ─────────────────────────────────────────────────
    const STRETCHES = {
      push: [
        { id:"sp1", name:"Chest Doorway Stretch",      muscle:"Chest · Front Delts",       hold:"40 sec" },
        { id:"sp2", name:"Cross-Body Shoulder Stretch", muscle:"Rear Delt · Rotator Cuff",  hold:"40 sec each side" },
        { id:"sp3", name:"Overhead Tricep Stretch",    muscle:"Triceps · Lat",              hold:"40 sec each side" },
      ],
      pull: [
        { id:"sl1", name:"Lat Stretch (bar hang or reach overhead)", muscle:"Lats · Teres Major", hold:"40 sec" },
        { id:"sl2", name:"Hip Flexor Lunge Stretch",   muscle:"Hip Flexors · Quads",        hold:"60 sec each side" },
        { id:"sl3", name:"Child's Pose",               muscle:"Lower Back · Lats",          hold:"60 sec" },
      ],
      legs: [
        { id:"sg1", name:"Hip Flexor Lunge Stretch",   muscle:"Hip Flexors · Quads",        hold:"60 sec each side" },
        { id:"sg2", name:"Hamstring Stretch",          muscle:"Hamstrings",                 hold:"40 sec each side" },
        { id:"sg3", name:"Pigeon Pose / Figure-4",     muscle:"Glutes · Piriformis",        hold:"60 sec each side" },
        { id:"sg4", name:"Standing Quad Stretch",      muscle:"Quads",                      hold:"40 sec each side" },
        { id:"sg5", name:"Calf Stretch (wall)",        muscle:"Calves · Achilles",          hold:"40 sec each side" },
      ],
      metabolic: [
        { id:"sm1", name:"Hip Flexor Lunge Stretch",   muscle:"Hip Flexors · Quads",        hold:"60 sec each side" },
        { id:"sm2", name:"Chest Doorway Stretch",      muscle:"Chest · Front Delts",        hold:"40 sec" },
        { id:"sm3", name:"Child's Pose",               muscle:"Lower Back · Lats",          hold:"60 sec" },
        { id:"sm4", name:"Hamstring Stretch",          muscle:"Hamstrings",                 hold:"40 sec each side" },
      ],
    };

    // ── PROGRAM ───────────────────────────────────────────────────
    const PROGRAM = {
      push: {
        label:"Push", sublabel:"Chest · Shoulders · Triceps", emoji:"🫸", color:"#f97316",
        exercises: [
          { id:"p1", name:"Incline Barbell Press",     sets:4, repsTarget:"5–7",   repRange:[5,7],   rest:"90 sec" },
          { id:"p2", name:"DB Bench Press",            sets:3, repsTarget:"10–12", repRange:[10,12], rest:"60 sec" },
          { id:"p3", name:"Seated DB Shoulder Press",  sets:3, repsTarget:"10–12", repRange:[10,12], rest:"60 sec" },
          { id:"p4", name:"Lateral Raises",            sets:3, repsTarget:"15",    repRange:[15,15], rest:"45 sec", supersetWith:"p5" },
          { id:"p5", name:"Overhead Tricep Extension", sets:3, repsTarget:"12",    repRange:[12,12], rest:"45 sec", supersetWith:"p4" },
          { id:"p6", name:"Tricep Pushdown (cable)",   sets:3, repsTarget:"12–15", repRange:[12,15], rest:"45 sec", supersetWith:"p7" },
          { id:"p7", name:"Crunch Machine",            sets:3, repsTarget:"12–15", repRange:[12,15], rest:"45 sec", supersetWith:"p6" },
        ],
      },
      pull: {
        label:"Pull", sublabel:"Back · Biceps · Rear Delts · Shoulders", emoji:"🫷", color:"#3b82f6",
        exercises: [
          { id:"pu1", name:"Deadlift / Trap Bar Deadlift", sets:4, repsTarget:"5–6",        repRange:[5,6],   rest:"90 sec" },
          { id:"pu2", name:"Lat Pulldown",                 sets:4, repsTarget:"10–12",      repRange:[10,12], rest:"60 sec" },
          { id:"pu3", name:"Seated Cable Row",             sets:3, repsTarget:"10–12",      repRange:[10,12], rest:"60 sec" },
          { id:"pu4", name:"T-Bar Row",                    sets:3, repsTarget:"10–12",      repRange:[10,12], rest:"60 sec" },
          { id:"pu5", name:"Rear Delt Cable Fly",          sets:3, repsTarget:"15",         repRange:[15,15], rest:"45 sec", supersetWith:"pu6" },
          { id:"pu6", name:"EZ Bar Curl",                  sets:3, repsTarget:"12",         repRange:[12,12], rest:"45 sec", supersetWith:"pu5" },
          { id:"pu7", name:"Roman Chair Leg Raise",        sets:3, repsTarget:"12–15",      repRange:[12,15], rest:"45 sec",
            bodyweight:true, progressTip:"Progress: knee raise → straight leg raise → hold a plate on your chest" },
          { id:"pu8", name:"Cable Lateral Raises",         sets:3, repsTarget:"15",         repRange:[15,15], rest:"45 sec" },
        ],
      },
      legs: {
        label:"Legs", sublabel:"Quads · Hamstrings · Glutes · Calves", emoji:"🦵", color:"#22c55e",
        exercises: [
          { id:"l1", name:"Barbell Back Squat",    sets:4, repsTarget:"6–8",   repRange:[6,8],   rest:"90 sec" },
          { id:"l2", name:"Romanian Deadlift",     sets:4, repsTarget:"10–12", repRange:[10,12], rest:"60 sec" },
          { id:"l3", name:"Hip Thrust",            sets:4, repsTarget:"10–12", repRange:[10,12], rest:"60 sec" },
          { id:"l4", name:"Leg Curl Machine",      sets:3, repsTarget:"12–15", repRange:[12,15], rest:"45 sec", supersetWith:"l5" },
          { id:"l5", name:"Leg Extension Machine", sets:3, repsTarget:"12–15", repRange:[12,15], rest:"45 sec", supersetWith:"l4" },
          { id:"l6", name:"Standing Calf Raises",  sets:4, repsTarget:"10–12", repRange:[10,12], rest:"45 sec" },
        ],
      },
      metabolic: {
        label:"Full Body Metabolic", sublabel:"Circuit · 4 rounds · 60 sec rest between rounds", emoji:"🔥", color:"#ef4444",
        isCircuit:true,
        exercises: [
          { id:"m1", name:"Burpees",              sets:4, repsTarget:"10",      repRange:[10,10], rest:"—",
            bodyweight:true, progressTip:"Progress: increase reps each week (10 → 12 → 15)" },
          { id:"m2", name:"Push-Ups / Dips",      sets:4, repsTarget:"12–15",  repRange:[12,15], rest:"—",
            bodyweight:true, progressTip:"Progress: push-ups → dips → add a DB between legs for resistance" },
          { id:"m3", name:"TRX Row",              sets:4, repsTarget:"12",      repRange:[12,12], rest:"—",
            bodyweight:true, progressTip:"Progress: decrease body angle (more horizontal = harder) → slow eccentric (3 sec down)" },
          { id:"m4", name:"Mountain Climbers",    sets:4, repsTarget:"30 sec",  repRange:null,    rest:"—",
            bodyweight:true, progressTip:"Progress: increase duration each week (30s → 40s → 45s)" },
          { id:"m5", name:"Rowing Machine Sprint",sets:4, repsTarget:"20 sec",  repRange:null,    rest:"—", isRowing:true },
          { id:"m6", name:"Plank Hold",           sets:4, repsTarget:"40 sec",  repRange:null,    rest:"60 sec",
            bodyweight:true, progressTip:"Progress: increase duration each week (40s → 50s → 60s)" },
        ],
      },
      cardio: {
        label:"Cardio", sublabel:"Pick one for today", emoji:"🏃", color:"#a855f7",
        isChooseOne:true,
        exercises: [
          { id:"ca1", name:"Rowing Machine – Zone 2",      sets:1,  repsTarget:"30 min",                repRange:null, rest:"—",
            bodyweight:true, progressTip:"Conversational pace · Target 60–65% max HR · Damper 5–6" },
          { id:"ca2", name:"Rowing Machine – HIIT",        sets:15, repsTarget:"20 sec on / 40 sec off", repRange:null, rest:"40 sec",
            bodyweight:true, progressTip:"All-out effort on 20 sec · Build from 10 to 15 rounds · Damper 5–6" },
          { id:"ca3", name:"Stair Stepper – Steady State", sets:1,  repsTarget:"30 min",                repRange:null, rest:"—",
            bodyweight:true, progressTip:"Moderate pace · Great for glutes and calves · Target 60–65% max HR" },
        ],
      },
    };

    const ALL_EXERCISES = Object.entries(PROGRAM).flatMap(([sKey,s]) =>
      s.exercises.map(e=>({...e, sessionKey:sKey, sessionLabel:s.label, sessionColor:s.color, sessionEmoji:s.emoji}))
    );

    const ELLIPTICAL_DAYS = ["Monday","Tuesday","Thursday","Friday"];
    const WEEK_PLAN = [
      { day:"Monday",    session:"push" },
      { day:"Tuesday",   session:"pull" },
      { day:"Wednesday", session:"cardio" },
      { day:"Thursday",  session:"legs" },
      { day:"Friday",    session:"metabolic" },
      { day:"Saturday",  session:"cardio" },
      { day:"Sunday",    session:null },
    ];

    const TODAY_KEY = todayKey();
    const TODAY_DOW = dayOfWeek(TODAY_KEY); // e.g. "Monday"

    function initExercise(ex) {
      return Array.from({ length:ex.sets }, ()=>({ weight:"", reps:"", done:false }));
    }

    // ── LOG STRUCTURE ─────────────────────────────────────────────
    // logs: { "2024-11-04": { exercises: { exId: [sets] }, stretches: { stretchId: bool } } }
    // Active session key = TODAY_KEY

    function getLastSessionData(logs, exerciseId, currentDateKey) {
      // Find most recent date (before today) that has data for this exercise
      const keys = Object.keys(logs)
        .filter(k => k < currentDateKey)
        .sort()
        .reverse();
      for (const k of keys) {
        const sets = logs[k]?.exercises?.[exerciseId];
        if (sets && sets.length > 0) {
          const weights = sets.map(s=>parseFloat(s.weight)).filter(w=>!isNaN(w)&&w>0);
          const reps = sets.map(s=>parseInt(s.reps)).filter(r=>!isNaN(r));
          const allDone = sets.every(s=>s.done);
          if (weights.length>0||reps.length>0) return { weights, reps, allDone, dateKey:k };
        }
      }
      return null;
    }

    function getRepBanner(lastData, repRange, currentSets) {
      if (!lastData||!repRange) return null;
      if (lastData.reps.length>0) {
        const avg = lastData.reps.reduce((a,b)=>a+b,0)/lastData.reps.length;
        if (avg < repRange[0]-2) return "reduce";
      }
      if (lastData.allDone && lastData.reps.length>0 && lastData.reps.every(r=>r>=repRange[1])) {
        const lastMaxW = lastData.weights.length>0 ? Math.max(...lastData.weights) : 0;
        const currentWeights = (currentSets||[]).map(s=>parseFloat(s.weight)).filter(w=>!isNaN(w)&&w>0);
        const currentMaxW = currentWeights.length>0 ? Math.max(...currentWeights) : 0;
        if (currentMaxW<=lastMaxW) return "increase";
      }
      return null;
    }

    // ── HISTORY HELPERS ───────────────────────────────────────────
    function buildExerciseHistory(logs, exerciseId, isBodyweight) {
      const entries = Object.keys(logs)
        .sort()
        .map(dateKey => {
          const sets = logs[dateKey]?.exercises?.[exerciseId];
          if (!sets || sets.length === 0) return null;
          const weights = sets.map(s=>parseFloat(s.weight)).filter(w=>!isNaN(w)&&w>0);
          const reps = sets.map(s=>parseInt(s.reps)).filter(r=>!isNaN(r));
          const done = sets.every(s=>s.done);
          if (isBodyweight) {
            if (reps.length===0) return null;
            return { dateKey, label:fmtDate(dateKey), maxReps:Math.max(...reps), sets, done };
          } else {
            if (weights.length===0) return null;
            return { dateKey, label:fmtDate(dateKey), maxWeight:Math.max(...weights), sets, done };
          }
        })
        .filter(Boolean);
      return entries;
    }

    // ── CHART ─────────────────────────────────────────────────────
    function ProgressionChart({ entries, color, isBodyweight }) {
      if (entries.length < 2) return (
        <div style={{textAlign:"center",padding:"28px 0",color:"#2d4060",fontSize:"12px"}}>
          Log at least 2 sessions to see the progression graph
        </div>
      );
      // Last 16 entries max
      const data = entries.slice(-16);
      const W=320, H=120, PAD={top:10,right:16,bottom:36,left:40};
      const plotW=W-PAD.left-PAD.right, plotH=H-PAD.top-PAD.bottom;
      const vals=data.map(e=>isBodyweight?e.maxReps:e.maxWeight);
      const minV=Math.min(...vals), maxV=Math.max(...vals), range=maxV-minV||5;
      const px=(i)=>PAD.left+(data.length===1?plotW/2:(i/(data.length-1))*plotW);
      const py=(v)=>PAD.top+plotH-((v-minV)/range)*plotH;
      const points=data.map((e,i)=>`${px(i)},${py(isBodyweight?e.maxReps:e.maxWeight)}`).join(" ");
      const area=data.length<2?"":(`M${px(0)},${py(vals[0])} `+data.slice(1).map((e,i)=>`L${px(i+1)},${py(isBodyweight?e.maxReps:e.maxWeight)}`).join(" ")+` L${px(data.length-1)},${PAD.top+plotH} L${px(0)},${PAD.top+plotH} Z`);
      const yLabels=[minV,minV+range*0.5,maxV].map(v=>Math.round(v));
      // Show every other label if too many points
      const showLabel=(i)=>data.length<=8||(i===0||i===data.length-1||i%2===0);
      return (
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
          {[0,0.5,1].map((t,i)=><line key={i} x1={PAD.left} y1={PAD.top+plotH*(1-t)} x2={PAD.left+plotW} y2={PAD.top+plotH*(1-t)} stroke="#0e1c30" strokeWidth="1"/>)}
          {area&&<path d={area} fill={color+"18"}/>}
          <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
          {data.map((e,i)=><circle key={i} cx={px(i)} cy={py(isBodyweight?e.maxReps:e.maxWeight)} r="3.5" fill={color} stroke="#080f1e" strokeWidth="1.5"/>)}
          {yLabels.map((v,i)=><text key={i} x={PAD.left-5} y={PAD.top+plotH*(1-i*0.5)+4} textAnchor="end" fontSize="9" fill="#3d5470" fontFamily="monospace">{v}</text>)}
          {data.map((e,i)=>showLabel(i)&&(
            <text key={i} x={px(i)} y={H-2} textAnchor="middle" fontSize="8" fill="#3d5470" fontFamily="'Barlow',sans-serif"
              transform={data.length>6?`rotate(-35,${px(i)},${H-2})`:""}>{e.label.split(" ").slice(1).join(" ")}</text>
          ))}
          <text x="8" y={PAD.top+plotH/2} textAnchor="middle" fontSize="8" fill="#2d4060" transform={`rotate(-90,8,${PAD.top+plotH/2})`} fontFamily="monospace">{isBodyweight?"reps":"lbs"}</text>
        </svg>
      );
    }

    // ── HISTORY SCREEN ────────────────────────────────────────────
    function HistoryScreen({ logs, onClose }) {
      const [selectedEx, setSelectedEx] = useState(null);

      if (selectedEx) {
        const ex = ALL_EXERCISES.find(e=>e.id===selectedEx);
        const isBW = !!ex.bodyweight||!!ex.isRowing;
        const entries = buildExerciseHistory(logs, selectedEx, isBW);
        const recent = entries.slice(-12).reverse(); // show most recent first
        return (
          <div style={{minHeight:"100vh",background:"#050c18",fontFamily:"'Barlow',sans-serif",paddingBottom:"40px"}}>
            <div style={{background:"linear-gradient(180deg,#080f1e,#050c18)",padding:"max(env(safe-area-inset-top),20px) 18px 14px",borderBottom:"1px solid #0d1c30",position:"sticky",top:0,zIndex:10}}>
              <div style={{maxWidth:"500px",margin:"0 auto"}}>
                <button onClick={()=>setSelectedEx(null)} style={{background:"none",border:"none",color:"#3b82f6",cursor:"pointer",fontSize:"13px",fontWeight:700,padding:"0 0 8px",display:"flex",alignItems:"center",gap:"6px"}}>← Back to History</button>
                <div style={{fontSize:"9px",color:ex.sessionColor,fontWeight:800,letterSpacing:"0.15em",marginBottom:"2px",fontFamily:"'Barlow Condensed',sans-serif"}}>{ex.sessionEmoji} {ex.sessionLabel.toUpperCase()}</div>
                <h2 style={{margin:0,fontSize:"20px",fontWeight:800,color:"#e2e8f0",fontFamily:"'Barlow Condensed',sans-serif"}}>{ex.name}</h2>
              </div>
            </div>
            <div style={{maxWidth:"500px",margin:"0 auto",padding:"16px"}}>
              {entries.length===0 ? (
                <div style={{textAlign:"center",padding:"60px 20px",color:"#2d4060"}}>
                  <div style={{fontSize:"40px",marginBottom:"12px"}}>📭</div>
                  <div style={{fontSize:"14px"}}>No sessions logged yet.</div>
                </div>
              ) : (
                <>
                  <div style={{background:"#080f1e",border:"1px solid #111c30",borderRadius:"12px",padding:"16px",marginBottom:"16px"}}>
                    <div style={{fontSize:"10px",color:"#2d4060",fontWeight:800,letterSpacing:"0.1em",marginBottom:"12px"}}>{isBW?"REPS PROGRESSION":"WEIGHT PROGRESSION (lbs)"}</div>
                    <ProgressionChart entries={entries} color={ex.sessionColor} isBodyweight={isBW}/>
                  </div>
                  <div style={{fontSize:"10px",color:"#2d4060",fontWeight:800,letterSpacing:"0.1em",marginBottom:"10px"}}>SESSION LOG · LAST {Math.min(recent.length,12)} SESSIONS</div>
                  {recent.map((entry,i)=>{
                    const sets = logs[entry.dateKey]?.exercises?.[selectedEx]||[];
                    return (
                      <div key={i} style={{background:"#080f1e",border:"1px solid #111c30",borderLeft:`3px solid ${ex.sessionColor}`,borderRadius:"10px",padding:"12px 14px",marginBottom:"8px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                          <span style={{color:"#e2e8f0",fontSize:"13px",fontWeight:700}}>{entry.label}</span>
                          <span style={{color:ex.sessionColor,fontSize:"12px",fontWeight:700,fontFamily:"monospace"}}>{isBW?`Max: ${entry.maxReps} reps`:`Max: ${entry.maxWeight} lbs`}</span>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:isBW?"22px 1fr 1fr":"22px 1fr 1fr 1fr",gap:"6px"}}>
                          <span/>{!isBW&&<span style={{fontSize:"10px",color:"#2d4060",fontWeight:700}}>LBS</span>}
                          <span style={{fontSize:"10px",color:"#2d4060",fontWeight:700}}>REPS</span>
                          <span style={{fontSize:"10px",color:"#2d4060",fontWeight:700}}>DONE</span>
                        </div>
                        {sets.map((s,j)=>(
                          <div key={j} style={{display:"grid",gridTemplateColumns:isBW?"22px 1fr 1fr":"22px 1fr 1fr 1fr",gap:"6px",marginTop:"5px",alignItems:"center"}}>
                            <span style={{fontSize:"10px",color:"#3d5470",textAlign:"center",fontFamily:"monospace"}}>{j+1}</span>
                            {!isBW&&<span style={{fontSize:"13px",color:s.weight?"#e2e8f0":"#2d4060",fontFamily:"monospace"}}>{s.weight||"—"}</span>}
                            <span style={{fontSize:"13px",color:s.reps?"#e2e8f0":"#2d4060",fontFamily:"monospace"}}>{s.reps||"—"}</span>
                            <span style={{fontSize:"13px"}}>{s.done?"✅":"—"}</span>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          </div>
        );
      }

      const sessions = Object.entries(PROGRAM).filter(([,s])=>!s.isChooseOne);
      return (
        <div style={{minHeight:"100vh",background:"#050c18",fontFamily:"'Barlow',sans-serif",paddingBottom:"40px"}}>
          <div style={{background:"linear-gradient(180deg,#080f1e,#050c18)",padding:"max(env(safe-area-inset-top),20px) 18px 14px",borderBottom:"1px solid #0d1c30",position:"sticky",top:0,zIndex:10}}>
            <div style={{maxWidth:"500px",margin:"0 auto"}}>
              <button onClick={onClose} style={{background:"none",border:"none",color:"#3b82f6",cursor:"pointer",fontSize:"13px",fontWeight:700,padding:"0 0 8px",display:"flex",alignItems:"center",gap:"6px"}}>← Back to Tracker</button>
              <div style={{fontSize:"9px",color:"#1e4a7a",fontWeight:800,letterSpacing:"0.22em",marginBottom:"2px",fontFamily:"'Barlow Condensed',sans-serif"}}>EXERCISE</div>
              <h1 style={{margin:0,fontSize:"24px",fontWeight:800,color:"#e2e8f0",fontFamily:"'Barlow Condensed',sans-serif"}}>HISTORY</h1>
            </div>
          </div>
          <div style={{maxWidth:"500px",margin:"0 auto",padding:"16px"}}>
            {sessions.map(([sKey,s])=>(
              <div key={sKey} style={{marginBottom:"20px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}>
                  <span style={{fontSize:"18px"}}>{s.emoji}</span>
                  <span style={{fontSize:"12px",fontWeight:800,color:s.color,letterSpacing:"0.1em",fontFamily:"'Barlow Condensed',sans-serif"}}>{s.label.toUpperCase()}</span>
                </div>
                {s.exercises.map(ex=>{
                  const isBW=!!ex.bodyweight||!!ex.isRowing;
                  const entries=buildExerciseHistory(logs,ex.id,isBW);
                  const hasData=entries.length>0;
                  const last=hasData?entries[entries.length-1]:null;
                  return (
                    <button key={ex.id} onClick={()=>setSelectedEx(ex.id)} style={{width:"100%",background:"#080f1e",border:`1px solid ${hasData?"#1a2a45":"#0d1825"}`,borderLeft:`3px solid ${hasData?s.color:"#1a2a45"}`,borderRadius:"10px",padding:"11px 14px",marginBottom:"6px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{textAlign:"left"}}>
                        <div style={{color:hasData?"#e2e8f0":"#3d5470",fontSize:"13px",fontWeight:600}}>{ex.name}</div>
                        <div style={{color:"#3d5470",fontSize:"11px",marginTop:"2px"}}>{hasData?`${entries.length} session${entries.length>1?"s":""} · Last: ${isBW?`${last.maxReps} reps`:`${last.maxWeight} lbs`} · ${last.label}`:"No sessions logged yet"}</div>
                      </div>
                      <span style={{color:"#2d4060",fontSize:"13px"}}>›</span>
                    </button>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── STRETCH SECTION ───────────────────────────────────────────
    function StretchSection({ sessionKey, stretchLog, setStretchLog }) {
      const stretches = STRETCHES[sessionKey];
      if (!stretches) return null;
      const total=stretches.length;
      const done=stretches.filter(s=>stretchLog[s.id]).length;
      const pct=Math.round((done/total)*100);
      const toggle=(id)=>setStretchLog(prev=>({...prev,[id]:!prev[id]}));
      return (
        <div style={{marginTop:"24px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}}>
            <div style={{flex:1,height:"1px",background:"#0e1c30"}}/>
            <span style={{fontSize:"10px",color:"#2d4060",fontWeight:800,letterSpacing:"0.12em",whiteSpace:"nowrap"}}>🧘 POST-WORKOUT STRETCHES</span>
            <div style={{flex:1,height:"1px",background:"#0e1c30"}}/>
          </div>
          <div style={{marginBottom:"14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
              <span style={{color:"#2d4060",fontSize:"10px",fontWeight:800,letterSpacing:"0.1em"}}>STRETCH PROGRESS</span>
              <span style={{color:pct===100?"#22c55e":"#4a6080",fontSize:"12px",fontWeight:700,fontFamily:"monospace"}}>{pct===100?"🎉 All done!":`${done}/${total}`}</span>
            </div>
            <div style={{height:"3px",background:"#0e1c30",borderRadius:"99px",overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:pct===100?"#22c55e":"#06b6d4",borderRadius:"99px",transition:"width 0.4s ease"}}/>
            </div>
          </div>
          {stretches.map(s=>(
            <button key={s.id} onClick={()=>toggle(s.id)} style={{width:"100%",background:stretchLog[s.id]?"#052e1a":"#080f1e",border:`1px solid ${stretchLog[s.id]?"#22c55e44":"#111c30"}`,borderLeft:`3px solid ${stretchLog[s.id]?"#22c55e":"#06b6d4"}`,borderRadius:"10px",padding:"12px 14px",marginBottom:"6px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all 0.2s"}}>
              <div style={{textAlign:"left"}}>
                <div style={{color:stretchLog[s.id]?"#86efac":"#e2e8f0",fontSize:"13px",fontWeight:600}}>{s.name}</div>
                <div style={{display:"flex",gap:"8px",marginTop:"3px",flexWrap:"wrap"}}>
                  <span style={{color:"#3d5470",fontSize:"11px"}}>{s.muscle}</span>
                  <span style={{color:"#06b6d4",fontSize:"11px",fontWeight:700}}>⏱ {s.hold}</span>
                </div>
              </div>
              <div style={{width:"28px",height:"28px",borderRadius:"50%",flexShrink:0,border:stretchLog[s.id]?"none":"1.5px solid #2d3f5c",background:stretchLog[s.id]?"#22c55e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",color:"#fff",transition:"all 0.2s",boxShadow:stretchLog[s.id]?"0 0 10px #22c55e55":"none"}}>{stretchLog[s.id]?"✓":""}</div>
            </button>
          ))}
        </div>
      );
    }

    // ── SET ROW ───────────────────────────────────────────────────
    function SetRow({ setNum, data, onChange, lastWeight, isBodyweight, isRowing }) {
      const base={background:"#0a1020",borderRadius:"8px",color:"#f1f5f9",padding:"8px 10px",fontSize:"14px",width:"100%",outline:"none",fontFamily:"monospace"};
      const showWeight=!isBodyweight&&!isRowing;
      const cols=isRowing?"22px 1fr 1fr 32px":showWeight?"22px 1fr 1fr 32px":"22px 1fr 32px";
      return (
        <div style={{display:"grid",gridTemplateColumns:cols,gap:"7px",alignItems:"center",marginBottom:"8px"}}>
          <span style={{fontSize:"11px",color:"#64748b",fontWeight:700,textAlign:"center",fontFamily:"monospace"}}>{setNum}</span>
          {showWeight&&<input type="number" inputMode="decimal" placeholder={lastWeight?String(lastWeight):"lbs"} value={data.weight} onChange={e=>onChange({...data,weight:e.target.value})} style={{...base,border:`1.5px solid ${data.weight?"#334155":"#1a2540"}`}}/>}
          {isRowing&&<input type="number" inputMode="decimal" placeholder="resistance" value={data.weight} onChange={e=>onChange({...data,weight:e.target.value})} style={{...base,border:`1.5px solid ${data.weight?"#334155":"#1a2540"}`}}/>}
          <input type="text" inputMode="numeric" placeholder="reps" value={data.reps} onChange={e=>onChange({...data,reps:e.target.value})} style={{...base,border:`1.5px solid ${data.reps?"#334155":"#1a2540"}`}}/>
          <button onClick={()=>onChange({...data,done:!data.done})} style={{width:"32px",height:"32px",borderRadius:"50%",border:data.done?"none":"1.5px solid #2d3f5c",background:data.done?"#22c55e":"#0a1020",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",color:"#fff",transition:"all 0.2s",flexShrink:0,boxShadow:data.done?"0 0 10px #22c55e55":"none"}}>{data.done?"✓":""}</button>
        </div>
      );
    }

    // ── EXERCISE CARD ─────────────────────────────────────────────
    function ExerciseCard({ exercise, logData, onChange, logs, dateKey, sessionColor, supersetLabel }) {
      const [open,setOpen]=useState(false);
      const allDone=logData.length>0&&logData.every(s=>s.done);
      const anyLogged=logData.some(s=>s.done||s.weight||s.reps);
      const isBW=!!exercise.bodyweight;
      const isRowing=!!exercise.isRowing;
      const lastData=getLastSessionData(logs,exercise.id,dateKey);
      const lastWeight=(!isBW&&!isRowing&&lastData?.weights?.length>0)?lastData.weights[lastData.weights.length-1]:null;
      const banner=getRepBanner(lastData,exercise.repRange,logData);
      return (
        <div style={{background:"#080f1e",border:`1px solid ${allDone?"#22c55e44":"#111c30"}`,borderLeft:`3px solid ${allDone?"#22c55e":anyLogged?sessionColor+"aa":"#1a2a45"}`,borderRadius:"10px",marginBottom:"6px",overflow:"hidden",transition:"all 0.25s"}}>
          <button onClick={()=>setOpen(!open)} style={{width:"100%",background:"none",border:"none",padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px"}}>
            <div style={{textAlign:"left",minWidth:0,flex:1}}>
              <div style={{display:"flex",gap:"4px",marginBottom:"2px",flexWrap:"wrap"}}>
                {supersetLabel&&<span style={{fontSize:"9px",fontWeight:800,color:sessionColor,background:sessionColor+"20",borderRadius:"3px",padding:"1px 5px",letterSpacing:"0.1em"}}>{supersetLabel}</span>}
                {isBW&&<span style={{fontSize:"9px",fontWeight:800,color:"#64748b",background:"#1e293b",borderRadius:"3px",padding:"1px 5px",letterSpacing:"0.08em"}}>BODYWEIGHT</span>}
              </div>
              <div style={{color:allDone?"#86efac":"#e2e8f0",fontSize:"14px",fontWeight:600}}>{exercise.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:"6px",marginTop:"3px",flexWrap:"wrap"}}>
                <span style={{color:"#3d5470",fontSize:"11px"}}>{exercise.sets} sets · {exercise.repsTarget} · rest {exercise.rest}</span>
                {lastWeight&&<span style={{fontSize:"11px",fontWeight:700,color:sessionColor,background:sessionColor+"18",borderRadius:"4px",padding:"1px 6px",fontFamily:"monospace"}}>↑ {lastWeight} lbs</span>}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"8px",flexShrink:0}}>
              {allDone&&<span>✅</span>}
              <span style={{color:"#2d4060",fontSize:"13px",transform:open?"rotate(180deg)":"none",transition:"0.2s",display:"inline-block"}}>▾</span>
            </div>
          </button>
          {open&&(
            <div style={{padding:"0 14px 14px"}}>
              {isBW&&exercise.progressTip&&<div style={{background:"#0f2236",border:"1px solid #1e3a5a",borderRadius:"8px",padding:"8px 12px",marginBottom:"8px",fontSize:"12px",color:"#60a5fa",display:"flex",alignItems:"flex-start",gap:"7px"}}><span>📈</span><span>{exercise.progressTip}</span></div>}
              {isRowing&&<div style={{background:"#0f2236",border:"1px solid #1e3a5a",borderRadius:"8px",padding:"8px 12px",marginBottom:"8px",fontSize:"12px",color:"#60a5fa",display:"flex",alignItems:"flex-start",gap:"7px"}}><span>🚣</span><span>Log your damper resistance setting (recommended: 5–6) · Row all-out for 20 sec</span></div>}
              {lastWeight&&<div style={{background:sessionColor+"10",border:`1px solid ${sessionColor}28`,borderRadius:"8px",padding:"8px 12px",marginBottom:"8px",fontSize:"12px",color:sessionColor,display:"flex",alignItems:"center",gap:"7px"}}><span>🏋️</span><span>Last session ({fmtDate(lastData.dateKey)}): <strong>{lastWeight} lbs</strong> — start here or go heavier</span></div>}
              {banner==="reduce"&&<div style={{background:"#3f0f0f",border:"1px solid #7f1d1d",borderRadius:"8px",padding:"8px 12px",marginBottom:"8px",fontSize:"12px",color:"#fca5a5",display:"flex",alignItems:"center",gap:"7px"}}><span>⚠️</span><span>Last session reps were low — try <strong>reducing weight 5–10 lbs</strong></span></div>}
              {banner==="increase"&&<div style={{background:"#052e16",border:"1px solid #14532d",borderRadius:"8px",padding:"8px 12px",marginBottom:"8px",fontSize:"12px",color:"#86efac",display:"flex",alignItems:"center",gap:"7px"}}><span>🟢</span><span>All sets completed last session — consider <strong>adding 5 lbs</strong> today</span></div>}
              <div style={{display:"grid",gridTemplateColumns:isBW?"22px 1fr 32px":isRowing?"22px 1fr 1fr 32px":"22px 1fr 1fr 32px",gap:"7px",marginBottom:"7px"}}>
                <span/>
                {isRowing&&<span style={{fontSize:"10px",color:"#2d4060",textAlign:"center",fontWeight:700,letterSpacing:"0.08em"}}>RESISTANCE</span>}
                {!isBW&&!isRowing&&<span style={{fontSize:"10px",color:"#2d4060",textAlign:"center",fontWeight:700,letterSpacing:"0.08em"}}>LBS</span>}
                <span style={{fontSize:"10px",color:"#2d4060",textAlign:"center",fontWeight:700,letterSpacing:"0.08em"}}>REPS</span>
                <span style={{fontSize:"10px",color:"#2d4060",textAlign:"center",fontWeight:700,letterSpacing:"0.08em"}}>✓</span>
              </div>
              {logData.map((s,i)=>(
                <SetRow key={i} setNum={i+1} data={s} lastWeight={lastWeight} isBodyweight={isBW} isRowing={isRowing}
                  onChange={updated=>{const copy=[...logData];copy[i]=updated;onChange(copy);}}/>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── SUPERSET BLOCK ────────────────────────────────────────────
    function SupersetBlock({ exercises, exLogs, onChanges, logs, dateKey, sessionColor }) {
      return (
        <div style={{border:`1px dashed ${sessionColor}44`,borderRadius:"12px",padding:"8px",marginBottom:"8px",background:sessionColor+"06"}}>
          <div style={{fontSize:"9px",fontWeight:800,color:sessionColor,letterSpacing:"0.12em",marginBottom:"6px",paddingLeft:"4px"}}>⚡ SUPERSET</div>
          {exercises.map((ex,i)=>(
            <ExerciseCard key={ex.id} exercise={ex} logData={exLogs[ex.id]||initExercise(ex)}
              onChange={updated=>onChanges(ex.id,updated)}
              logs={logs} dateKey={dateKey} sessionColor={sessionColor} supersetLabel={i===0?"A":"B"}/>
          ))}
        </div>
      );
    }

    // ── SESSION VIEW ──────────────────────────────────────────────
    function SessionView({ sessionKey, dateKey, logs, setLogs }) {
      const session=PROGRAM[sessionKey];
      const exLogs=logs[dateKey]?.exercises||{};
      const stretchLog=logs[dateKey]?.stretches||{};

      useEffect(()=>{
        const patch={};
        session.exercises.forEach(ex=>{if(!exLogs[ex.id])patch[ex.id]=initExercise(ex);});
        if(Object.keys(patch).length>0){
          setLogs(prev=>{
            const dayData=prev[dateKey]||{exercises:{},stretches:{}};
            const next={...prev,[dateKey]:{...dayData,exercises:{...dayData.exercises,...patch}}};
            try{localStorage.setItem("wt_v5_logs",JSON.stringify(next));}catch{}
            return next;
          });
        }
      },[sessionKey,dateKey]);

      const updateEx=(id,updated)=>{
        setLogs(prev=>{
          const dayData=prev[dateKey]||{exercises:{},stretches:{}};
          const next={...prev,[dateKey]:{...dayData,exercises:{...dayData.exercises,[id]:updated}}};
          try{localStorage.setItem("wt_v5_logs",JSON.stringify(next));}catch{}
          return next;
        });
      };

      const updateStretch=(updater)=>{
        setLogs(prev=>{
          const dayData=prev[dateKey]||{exercises:{},stretches:{}};
          const newStretches=typeof updater==="function"?updater(dayData.stretches||{}):updater;
          const next={...prev,[dateKey]:{...dayData,stretches:newStretches}};
          try{localStorage.setItem("wt_v5_logs",JSON.stringify(next));}catch{}
          return next;
        });
      };

      let totalSets,doneSets;
      if(session.isChooseOne){
        const anyComplete=session.exercises.some(ex=>{const s=exLogs[ex.id]||[];return s.length>0&&s.every(x=>x.done);});
        totalSets=1;doneSets=anyComplete?1:0;
      } else {
        totalSets=session.exercises.reduce((a,e)=>a+e.sets,0);
        doneSets=session.exercises.reduce((a,e)=>a+(exLogs[e.id]||[]).filter(s=>s.done).length,0);
      }
      const pct=totalSets>0?Math.round((doneSets/totalSets)*100):0;

      const rendered=[];const seen=new Set();
      session.exercises.forEach(ex=>{
        if(seen.has(ex.id))return;
        if(ex.supersetWith){
          const partner=session.exercises.find(e=>e.id===ex.supersetWith);
          if(partner&&!seen.has(partner.id)){seen.add(ex.id);seen.add(partner.id);rendered.push({type:"superset",exercises:[ex,partner]});return;}
        }
        seen.add(ex.id);rendered.push({type:"single",exercise:ex});
      });

      const dow=dayOfWeek(dateKey);
      return (
        <div>
          {ELLIPTICAL_DAYS.includes(dow)&&(
            <div style={{background:"#071520",border:"1px solid #0e3a55",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{fontSize:"20px"}}>⚡</span>
              <div><div style={{color:"#38bdf8",fontSize:"11px",fontWeight:800,letterSpacing:"0.1em"}}>ELLIPTICAL REMINDER</div><div style={{color:"#4a90aa",fontSize:"11px",marginTop:"1px"}}>30 min Zone 2 after lifting · Conversational pace</div></div>
            </div>
          )}
          {session.isChooseOne&&(
            <div style={{background:"#1a0a2e",border:`1px solid ${session.color}44`,borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{fontSize:"20px"}}>🎯</span>
              <div><div style={{color:session.color,fontSize:"11px",fontWeight:800,letterSpacing:"0.1em"}}>PICK ONE FOR TODAY</div><div style={{color:"#7c5aaa",fontSize:"11px",marginTop:"1px"}}>Complete any one exercise to finish the session</div></div>
            </div>
          )}
          {session.isCircuit&&(
            <div style={{background:"#1a0808",border:"1px solid #7f1d1d44",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{fontSize:"20px"}}>🔄</span>
              <div><div style={{color:"#fca5a5",fontSize:"11px",fontWeight:800,letterSpacing:"0.1em"}}>CIRCUIT FORMAT</div><div style={{color:"#9a6060",fontSize:"11px",marginTop:"1px"}}>All 6 exercises back-to-back = 1 round · Rest 60 sec · Repeat 4 rounds</div></div>
            </div>
          )}
          <div style={{marginBottom:"16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"7px"}}>
              <span style={{color:"#2d4060",fontSize:"10px",fontWeight:800,letterSpacing:"0.1em"}}>SESSION PROGRESS</span>
              <span style={{color:pct===100?"#22c55e":"#4a6080",fontSize:"12px",fontWeight:700,fontFamily:"monospace"}}>{pct===100?"🎉 Done!":`${pct}%`}</span>
            </div>
            <div style={{height:"3px",background:"#0e1c30",borderRadius:"99px",overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:pct===100?"#22c55e":session.color,borderRadius:"99px",transition:"width 0.5s ease",boxShadow:pct>0?`0 0 8px ${session.color}66`:"none"}}/>
            </div>
          </div>
          {rendered.map((item,idx)=>item.type==="superset"?(
            <SupersetBlock key={idx} exercises={item.exercises} exLogs={exLogs}
              onChanges={updateEx} logs={logs} dateKey={dateKey} sessionColor={session.color}/>
          ):(
            <ExerciseCard key={item.exercise.id} exercise={item.exercise}
              logData={exLogs[item.exercise.id]||initExercise(item.exercise)}
              onChange={updated=>updateEx(item.exercise.id,updated)}
              logs={logs} dateKey={dateKey} sessionColor={session.color}/>
          ))}
          <StretchSection sessionKey={sessionKey} stretchLog={stretchLog} setStretchLog={updateStretch}/>
        </div>
      );
    }

    // ── APP ───────────────────────────────────────────────────────
    function App() {
      const [activeDay,setActiveDay]=useState(TODAY_DOW||"Monday");
      const [showHistory,setShowHistory]=useState(false);

      // New log structure: { "YYYY-MM-DD": { exercises: {}, stretches: {} } }
      const [logs,setLogs]=useState(()=>{
        try{
          // Migrate old v4 logs if present
          const v4=localStorage.getItem("wt_v4_logs");
          const v5=localStorage.getItem("wt_v5_logs");
          if(v5) return JSON.parse(v5);
          // If only v4 exists, start fresh (old data was day-keyed, can't reliably migrate dates)
          return {};
        }catch{return {};}
      });

      // For the day tabs we still navigate by day-of-week, but the actual log key is TODAY_KEY
      // When viewing a past day in the same week we look up that date
      // Simple approach: tab shows today's session; other days are informational
      const currentPlan=WEEK_PLAN.find(d=>d.day===activeDay);
      const sessionKey=currentPlan?.session;
      const session=sessionKey?PROGRAM[sessionKey]:null;

      // Compute the actual date key for the selected day tab
      // Find the most recent occurrence of that weekday (within last 7 days)
      function dateKeyForDay(dow) {
        const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        const todayIdx=new Date().getDay();
        const targetIdx=days.indexOf(dow);
        let diff=todayIdx-targetIdx;
        if(diff<0) diff+=7;
        const d=new Date();
        d.setDate(d.getDate()-diff);
        return d.toISOString().slice(0,10);
      }

      const activeDateKey=dateKeyForDay(activeDay);
      const isToday=activeDateKey===TODAY_KEY;

      if(showHistory) return <HistoryScreen logs={logs} onClose={()=>setShowHistory(false)}/>;

      return (
        <div style={{minHeight:"100vh",background:"#050c18",fontFamily:"'Barlow','Segoe UI',sans-serif",paddingBottom:"60px"}}>
          <style>{`input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none} input::placeholder{color:#1e3050} *{box-sizing:border-box}`}</style>
          <div style={{background:"linear-gradient(180deg,#080f1e 0%,#050c18 100%)",padding:"max(env(safe-area-inset-top),20px) 18px 14px",borderBottom:"1px solid #0d1c30",position:"sticky",top:0,zIndex:10}}>
            <div style={{maxWidth:"500px",margin:"0 auto"}}>
              <div style={{fontSize:"9px",color:"#1e4a7a",fontWeight:800,letterSpacing:"0.22em",marginBottom:"2px",fontFamily:"'Barlow Condensed',sans-serif"}}>FAT LOSS · MUSCLE PRESERVATION</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <h1 style={{margin:0,fontSize:"24px",fontWeight:800,color:"#e2e8f0",letterSpacing:"0.02em",fontFamily:"'Barlow Condensed',sans-serif"}}>WORKOUT TRACKER</h1>
                  {session&&<div style={{fontSize:"10px",color:"#3d5470",marginTop:"1px"}}>{isToday?"Today":"Past session"} · {fmtDate(activeDateKey)}</div>}
                </div>
                <button onClick={()=>setShowHistory(true)} style={{background:"#0d1c30",border:"1px solid #1e3a5a",borderRadius:"8px",color:"#60a5fa",fontSize:"11px",fontWeight:800,padding:"6px 12px",cursor:"pointer",letterSpacing:"0.06em",fontFamily:"'Barlow Condensed',sans-serif"}}>📊 HISTORY</button>
              </div>
            </div>
          </div>

          <div style={{overflowX:"auto",padding:"12px 18px",background:"#050c18",borderBottom:"1px solid #0d1c30"}}>
            <div style={{display:"flex",gap:"6px",maxWidth:"500px",margin:"0 auto",minWidth:"max-content"}}>
              {WEEK_PLAN.map(({day,session:s})=>{
                const isActive=day===activeDay;
                const isTodayTab=day===TODAY_DOW;
                const prog=s?PROGRAM[s]:null;
                const dKey=dateKeyForDay(day);
                const dayExLogs=logs[dKey]?.exercises||{};
                let complete=false;
                if(prog){
                  if(prog.isChooseOne){complete=prog.exercises.some(ex=>{const sets=dayExLogs[ex.id]||[];return sets.length>0&&sets.every(s=>s.done);});}
                  else{const td=prog.exercises.reduce((a,e)=>a+(dayExLogs[e.id]||[]).filter(x=>x.done).length,0);const ts=prog.exercises.reduce((a,e)=>a+e.sets,0);complete=ts>0&&td===ts;}
                }
                return (
                  <button key={day} onClick={()=>s&&setActiveDay(day)} style={{padding:"8px 10px",borderRadius:"10px",border:isActive?`1.5px solid ${prog?prog.color+"88":"#334155"}`:"1.5px solid #0d1c30",background:isActive?(prog?prog.color+"14":"#0d1c30"):"transparent",cursor:s?"pointer":"default",opacity:!s?0.3:1,transition:"all 0.2s",minWidth:"52px",textAlign:"center",position:"relative"}}>
                    {isTodayTab&&<div style={{position:"absolute",top:"-3px",right:"-3px",width:"7px",height:"7px",borderRadius:"50%",background:"#facc15",border:"2px solid #050c18"}}/>}
                    {complete&&<div style={{position:"absolute",top:"-3px",left:"-3px",width:"7px",height:"7px",borderRadius:"50%",background:"#22c55e",border:"2px solid #050c18"}}/>}
                    <div style={{fontSize:"9px",color:isActive?(prog?prog.color:"#94a3b8"):"#2d4060",fontWeight:800,letterSpacing:"0.06em",fontFamily:"'Barlow Condensed',sans-serif"}}>{day.slice(0,3).toUpperCase()}</div>
                    <div style={{fontSize:"18px",marginTop:"2px"}}>{prog?prog.emoji:"😴"}</div>
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{maxWidth:"500px",margin:"0 auto",padding:"16px"}}>
            {sessionKey?(
              <SessionView sessionKey={sessionKey} dateKey={activeDateKey} logs={logs} setLogs={setLogs}/>
            ):(
              <div style={{textAlign:"center",padding:"80px 20px"}}>
                <div style={{fontSize:"56px",marginBottom:"16px"}}>😴</div>
                <div style={{fontSize:"22px",fontWeight:800,color:"#1a2a40",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.05em"}}>REST DAY</div>
